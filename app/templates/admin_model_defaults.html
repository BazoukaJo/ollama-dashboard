<!DOCTYPE html>
<html lang="en" class="dark" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model Defaults - Admin</title>
  <script>
  (function () {
    try {
      if (typeof localStorage !== "undefined") {
        var theme = localStorage.getItem("theme") || "dark";
        if (theme !== "light" && theme !== "dark") theme = "dark";
        var root = document.documentElement;
        root.classList.remove("light", "dark");
        root.classList.add(theme);
        root.setAttribute("data-bs-theme", theme);
      }
    } catch (e) {
      console.warn("Theme script error:", e);
    }
  })();
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <div class="container py-4">
    <header class="dashboard-header-banner mb-3">
      <button type="button" id="themeToggleBtn" class="theme-toggle-btn" data-dashboard-tooltip="Switch to light mode" aria-label="Switch to light mode">
        <i class="fas fa-sun theme-toggle-icon theme-toggle-icon--sun" aria-hidden="true"></i>
        <i class="fas fa-moon theme-toggle-icon theme-toggle-icon--moon" aria-hidden="true"></i>
      </button>
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 pt-1 dashboard-header-main">
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <h3 class="mb-0">Model Defaults</h3>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <a href="/" class="btn btn-outline-secondary">Back</a>
          <button class="btn btn-primary" id="applyAllBtn">Apply Recommended to All</button>
        </div>
      </div>
    </header>
    <div class="table-responsive">
      <table class="table table-dark table-striped">
        <thead>
          <tr><th>Model</th><th>Recommended</th><th>Action</th></tr>
        </thead>
        <tbody id="modelsTableBody">
          <tr><td colspan="3">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/tooltips.js') }}"></script>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <script src="{{ url_for('static', filename='js/modules/utils.js') }}"></script>
  <script src="{{ url_for('static', filename='js/modules/modelCards.js') }}"></script>
  <script src="{{ url_for('static', filename='js/modules/serviceControl.js') }}"></script>
  <script src="{{ url_for('static', filename='js/modules/settings.js') }}"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script src="{{ url_for('static', filename='js/modules/bootstrap.js') }}"></script>
  <script>
    async function loadModelDefaults() {
      const resp = await fetch('/api/models/available');
      const data = await resp.json();
      const tbody = document.getElementById('modelsTableBody');
      tbody.innerHTML = '';
      (data.models || []).forEach(m => {
        const row = document.createElement('tr');
        const recommendedCell = document.createElement('td');
        const recButton = document.createElement('button');
        recButton.className = 'btn btn-sm btn-outline-primary';
        recButton.innerText = 'Preview';
        recButton.onclick = async () => {
          const r = await fetch(`/api/models/settings/recommended/${encodeURIComponent(m.name)}`);
          const rj = await r.json();
          alert('Recommended: ' + JSON.stringify(rj.settings));
        };
        recommendedCell.appendChild(recButton);
        const actionCell = document.createElement('td');
        const applyBtn = document.createElement('button');
        applyBtn.className = 'btn btn-sm btn-primary';
        applyBtn.innerText = 'Apply';
        applyBtn.onclick = async () => {
          const r = await fetch(`/api/models/settings/${encodeURIComponent(m.name)}/reset`, { method: 'POST' });
          const jr = await r.json();
          if (jr.success) alert('Applied recommended for ' + m.name);
          else alert('Failed to apply: ' + JSON.stringify(jr));
        };
        actionCell.appendChild(applyBtn);

        const nameCell = document.createElement('td');
        nameCell.textContent = m.name || '';
        row.appendChild(nameCell);
        row.appendChild(recommendedCell);
        row.appendChild(actionCell);
        tbody.appendChild(row);
      });
    }

    document.getElementById('applyAllBtn').onclick = async () => {
      const r = await fetch('/api/models/settings/apply_all_recommended', { method: 'POST'});
      const jr = await r.json();
      if (jr.success) alert('Applied recommended defaults to all models.');
      else alert('Failed: ' + JSON.stringify(jr));
    }

    loadModelDefaults();
  </script>
</body>
</html>
