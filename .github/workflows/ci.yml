name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check app tests scripts ollama_dashboard_cli.py

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and sdist
        run: pip install build && python -m build
      - name: Install wheel and smoke-import app
        run: pip install dist/ollama_dashboard-*.whl && python -c "from app import create_app; create_app('production')"

  js-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Ask message format smoke tests
        run: node tests/test_ask_message_format.js

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-xdist

      - name: Run tests (excludes integration and playwright)
        run: pytest -q -m "not integration and not playwright" -n auto --dist loadscope

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-playwright

      - name: Install Chromium
        run: playwright install chromium

      - name: Run Playwright UI tests
        run: pytest -q -m playwright
